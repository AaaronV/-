<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>此身</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+SC:wght@200;300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #000000;
  --white: #ffffff;
  --grey-1: #111111;
  --grey-2: #1c1c1c;
  --grey-3: #2a2a2a;
  --grey-4: #444444;
  --grey-5: #888888;
  --grey-6: #aaaaaa;
}
html { scroll-behavior: smooth; }
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Noto Serif SC', serif;
  font-weight: 300;
  cursor: none;
  overflow-x: hidden;
}
.cursor {
  position: fixed;
  width: 8px; height: 8px;
  background: var(--white);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
  mix-blend-mode: difference;
}
.cursor.big { width: 36px; height: 36px; }
.loader {
  position: fixed; inset: 0;
  background: var(--black);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease;
}
.loader-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  color: var(--grey-4);
  text-transform: uppercase;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.loader.done { opacity: 0; pointer-events: none; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
header {
  padding: 6rem 6rem 4rem;
  border-bottom: 1px solid var(--grey-3);
  opacity: 0;
  animation: fadeUp 1s ease 0.6s forwards;
}
.header-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.35em;
  color: var(--grey-4);
  text-transform: uppercase;
  margin-bottom: 3rem;
}
.header-body {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
h1 {
  font-family: 'EB Garamond', serif;
  font-size: clamp(4rem, 9vw, 8.5rem);
  font-weight: 400;
  line-height: 0.92;
  letter-spacing: -0.02em;
}
h1 em { font-style: italic; color: var(--grey-5); display: block; }
.header-note {
  font-size: 0.72rem;
  color: var(--grey-5);
  line-height: 1.9;
  font-weight: 200;
  letter-spacing: 0.04em;
  text-align: right;
  max-width: 180px;
}
nav {
  display: flex;
  align-items: center;
  padding: 0 6rem;
  border-bottom: 1px solid var(--grey-3);
  opacity: 0;
  animation: fadeUp 1s ease 0.8s forwards;
}
.nav-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--grey-5);
  padding: 1.5rem 0;
  margin-right: 3rem;
  cursor: none;
  border: none;
  border-bottom: 1px solid transparent;
  background: none;
  transition: color 0.2s, border-color 0.2s;
}
.nav-btn:hover { color: var(--white); }
.nav-btn.active { color: var(--white); border-bottom-color: var(--white); }
.nav-count {
  margin-left: auto;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: var(--grey-4);
}
.add-btn {
  margin-left: 2rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: var(--white);
  color: var(--black);
  border: none;
  padding: 0.5rem 1.2rem;
  cursor: none;
  transition: background 0.2s;
}
.add-btn:hover { background: var(--grey-6); }
.section { display: none; animation: fadeUp 0.5s ease forwards; }
.section.visible { display: block; }
.sec-header {
  padding: 2.5rem 6rem 2rem;
  border-bottom: 1px solid var(--grey-3);
  display: flex;
  align-items: baseline;
  gap: 2rem;
}
.sec-title {
  font-family: 'EB Garamond', serif;
  font-size: 1.8rem;
  font-style: italic;
  color: var(--grey-5);
}
.sec-line { flex: 1; height: 1px; background: var(--grey-3); }
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.card {
  border-right: 1px solid var(--grey-3);
  border-bottom: 1px solid var(--grey-3);
  padding: 2.5rem 3rem;
  cursor: none;
  position: relative;
  overflow: hidden;
  transition: background 0.25s;
}
.card:nth-child(3n) { border-right: none; }
.card:hover { background: var(--grey-1); }
.card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 0; height: 1px;
  background: var(--white);
  transition: width 0.4s ease;
}
.card:hover::after { width: 100%; }
.card-idx {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  color: var(--grey-4);
  margin-bottom: 2rem;
}
.card-name {
  font-family: 'EB Garamond', serif;
  font-size: 1.55rem;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 0.3rem;
}
.card-sub {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--grey-5);
  margin-bottom: 2rem;
}
.card-attrs { display: flex; gap: 2rem; flex-wrap: wrap; }
.card-attr {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  color: var(--grey-4);
  text-transform: uppercase;
}
.card-attr span {
  display: block;
  color: var(--grey-6);
  margin-top: 0.25rem;
  font-size: 0.62rem;
}
.card-arrow {
  position: absolute;
  bottom: 1.8rem; right: 2.2rem;
  font-size: 0.7rem;
  color: var(--grey-4);
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.2s, transform 0.2s;
  font-family: 'Share Tech Mono', monospace;
}
.card:hover .card-arrow { opacity: 1; transform: translateX(0); }
.empty-msg {
  grid-column: 1/-1;
  padding: 5rem 6rem;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--grey-3);
}
/* DETAIL */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 500;
  display: flex;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.detail-panel {
  width: 52%;
  height: 100vh;
  overflow-y: auto;
  padding: 5rem 5rem 5rem 6rem;
  border-right: 1px solid var(--grey-3);
  transform: translateX(-24px);
  transition: transform 0.35s ease;
}
.overlay.open .detail-panel { transform: translateX(0); }
.detail-close-zone { flex: 1; cursor: none; }
.d-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--grey-4);
  margin-bottom: 1.5rem;
}
.d-title {
  font-family: 'EB Garamond', serif;
  font-size: clamp(2.2rem, 4vw, 3.8rem);
  font-weight: 400;
  line-height: 1.0;
  margin-bottom: 0.4rem;
}
.d-sub {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--grey-5);
  margin-bottom: 2.5rem;
}
.d-attrs {
  display: flex;
  gap: 2.5rem;
  flex-wrap: wrap;
  padding-bottom: 2.5rem;
  margin-bottom: 2.5rem;
  border-bottom: 1px solid var(--grey-3);
}
.d-attr {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.15em;
  color: var(--grey-4);
  text-transform: uppercase;
}
.d-attr span {
  display: block;
  font-family: 'Noto Serif SC', serif;
  font-size: 0.8rem;
  color: var(--white);
  margin-top: 0.4rem;
  font-weight: 300;
  letter-spacing: 0.04em;
}
.d-sec-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--grey-4);
  margin-bottom: 1.2rem;
}
.d-ing {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 0.65rem 0;
  border-bottom: 1px solid var(--grey-2);
  font-size: 0.82rem;
  font-weight: 300;
}
.d-ing:last-child { border-bottom: none; }
.d-ing-amt {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  color: var(--grey-5);
}
.d-ing-cat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey-4);
  margin-top: 1.4rem;
  margin-bottom: 0.4rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--grey-2);
}
.d-step {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.4rem;
  font-size: 0.82rem;
  line-height: 1.85;
  font-weight: 300;
}
.d-step-n {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 1.4rem;
  color: var(--grey-3);
  line-height: 1.3;
  min-width: 1.2rem;
}
.d-notes {
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--grey-3);
  font-size: 0.78rem;
  color: var(--grey-5);
  line-height: 1.95;
  font-style: italic;
  font-weight: 200;
}
.d-section { margin-bottom: 2.5rem; }
/* FORM */
.form-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.97);
  z-index: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.form-overlay.open { opacity: 1; pointer-events: all; }
.form-box {
  width: 520px;
  max-height: 88vh;
  overflow-y: auto;
  border: 1px solid var(--grey-3);
  padding: 3rem;
  transform: translateY(16px);
  transition: transform 0.3s;
}
.form-overlay.open .form-box { transform: translateY(0); }
.form-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 2.5rem;
}
.form-title {
  font-family: 'EB Garamond', serif;
  font-size: 1.7rem;
  font-weight: 400;
}
.form-x {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  color: var(--grey-4);
  background: none;
  border: none;
  cursor: none;
  text-transform: uppercase;
  transition: color 0.2s;
}
.form-x:hover { color: var(--white); }
.f-lbl {
  display: block;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--grey-4);
  margin-bottom: 0.5rem;
}
.f-in, .f-sel, .f-ta {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--grey-3);
  color: var(--white);
  font-family: 'Noto Serif SC', serif;
  font-size: 0.82rem;
  font-weight: 300;
  padding: 0.6rem 0;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1.8rem;
}
.f-in:focus, .f-sel:focus, .f-ta:focus { border-color: var(--white); }
.f-sel { cursor: none; }
.f-sel option { background: var(--black); }
.f-ta { resize: vertical; min-height: 68px; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.f-sub { width: 100%; background: var(--white); color: var(--black); border: none;
  font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; letter-spacing: 0.3em;
  text-transform: uppercase; padding: 0.9rem; cursor: none; margin-top: 0.5rem; transition: background 0.2s; }
.f-sub:hover { background: var(--grey-6); }
@media (max-width: 900px) {
  header, nav { padding-left: 2rem; padding-right: 2rem; }
  h1 { font-size: 4rem; }
  .header-note { display: none; }
  .grid { grid-template-columns: 1fr; }
  .card { border-right: none; }
  .detail-panel { width: 100%; padding: 3rem 2rem; }
  .sec-header { padding: 2rem; }
  .form-box { width: 92%; padding: 2rem; }
  .f-row { grid-template-columns: 1fr; gap: 0; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="loader" id="loader"><div class="loader-text">Loading —</div></div>

<header>
  <div class="header-eyebrow">此身 · Personal Archive</div>
  <div class="header-body">
    <h1>此身<em>在此</em></h1>
    <div class="header-note">既无所凭<br>仍在此身</div>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showSec('all',this)">全部</button>
  <button class="nav-btn" onclick="showSec('food',this)">食谱</button>
  <button class="nav-btn" onclick="showSec('cocktail',this)">调酒</button>
  <button class="nav-btn" onclick="showSec('dessert',this)">甜品</button>
  <span class="nav-count" id="navCount">— 0</span>
  <button class="add-btn" onclick="openForm()">+ 添加配方</button>
</nav>

<div class="section visible" id="sec-all"><div class="grid" id="grid-all"></div></div>
<div class="section" id="sec-food">
  <div class="sec-header"><div class="sec-title">食谱</div><div class="sec-line"></div></div>
  <div class="grid" id="grid-food"></div>
</div>
<div class="section" id="sec-cocktail">
  <div class="sec-header"><div class="sec-title">调酒</div><div class="sec-line"></div></div>
  <div class="grid" id="grid-cocktail"></div>
</div>
<div class="section" id="sec-dessert">
  <div class="sec-header"><div class="sec-title">甜品</div><div class="sec-line"></div></div>
  <div class="grid" id="grid-dessert"></div>
</div>

<!-- Detail -->
<div class="overlay" id="detailOverlay" onclick="overlayClick(event)">
  <div class="detail-panel" id="detailPanel"></div>
  <div class="detail-close-zone"></div>
</div>

<!-- Form -->
<div class="form-overlay" id="formOverlay" onclick="formOverlayClick(event)">
  <div class="form-box">
    <div class="form-head">
      <div class="form-title">新配方</div>
      <button class="form-x" onclick="closeForm()">关闭 ×</button>
    </div>
    <label class="f-lbl">配方名称</label>
    <input class="f-in" id="fName" placeholder="名称">
    <label class="f-lbl">副标题（英文或注释，可选）</label>
    <input class="f-in" id="fSub" placeholder="Subtitle">
    <label class="f-lbl">分类</label>
    <select class="f-sel" id="fType" onchange="updateLabels()">
      <option value="food">食谱</option>
      <option value="cocktail">调酒</option>
      <option value="dessert">甜品</option>
    </select>
    <div class="f-row">
      <div><label class="f-lbl" id="lA1">难度</label><input class="f-in" id="fA1" placeholder="简单 / 中等 / 困难"></div>
      <div><label class="f-lbl" id="lA2">时间</label><input class="f-in" id="fA2" placeholder="30分钟"></div>
    </div>
    <label class="f-lbl" id="lA3">份量</label>
    <input class="f-in" id="fA3" placeholder="2人份">
    <label class="f-lbl">食材 / 原料（每行一条，中文逗号分隔名称和用量）</label>
    <textarea class="f-ta" id="fIng" placeholder="大虾，300g&#10;黄油，40g&#10;大蒜，6瓣"></textarea>
    <label class="f-lbl">步骤（每行一步）</label>
    <textarea class="f-ta" id="fSteps" placeholder="热锅融化黄油&#10;放入蒜末炒香&#10;加入大虾翻炒至变色"></textarea>
    <label class="f-lbl">备注 / 心得（可选）</label>
    <textarea class="f-ta" id="fNotes" placeholder="第一次的感受，下次想改进的地方…" style="min-height:52px"></textarea>
    <button class="f-sub" onclick="saveRecipe()">保存配方</button>
  </div>
</div>

<script>
// cursor
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cur.style.left = e.clientX+'px'; cur.style.top = e.clientY+'px'; });
function addHover(el) {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
}
document.querySelectorAll('button').forEach(addHover);

// loader
window.addEventListener('load', () => setTimeout(() => document.getElementById('loader').classList.add('done'), 700));

// data
const typeMap = { food:'食谱', cocktail:'调酒', dessert:'甜品' };
const attrMap = {
  food: ['难度','时间','份量'],
  cocktail: ['杯型','手法','酒精度'],
  dessert: ['难度','时间','份量'],
};

let data = [
  { type:'food', name:'蒜香黄油大虾', sub:'Garlic Butter Shrimp',
    attrs:[{k:'难度',v:'简单'},{k:'时间',v:'15分钟'},{k:'份量',v:'2人'}],
    ing:{
      '肉 / 海鲜':[{n:'大虾',a:'300g'}],
      '辅料':[{n:'大蒜',a:'6瓣'},{n:'欧芹',a:'适量'}],
      '调味料':[{n:'无盐黄油',a:'40g'},{n:'白葡萄酒',a:'2大勺'},{n:'柠檬汁',a:'半个柠檬'},{n:'盐、黑胡椒',a:'适量'}],
    },
    steps:['大虾去壳挑线，盐和黑胡椒腌制5分钟。','热锅放入黄油，加蒜末炒香30秒。','放入大虾，每面煎1分钟，倒入白葡萄酒。','加剩余黄油，挤入柠檬汁，翻炒出锅撒欧芹。'],
    notes:'虾变色即可，过火会变老。白葡萄酒可用鸡汤代替。' },

  { type:'food', name:'红酒炖牛肉', sub:'Boeuf Bourguignon',
    attrs:[{k:'难度',v:'中等'},{k:'时间',v:'3小时'},{k:'份量',v:'4人'}],
    ing:{
      '肉 / 海鲜':[{n:'牛腩',a:'800g'},{n:'培根',a:'100g'}],
      '辅料':[{n:'洋葱',a:'2个'},{n:'胡萝卜',a:'2根'},{n:'蘑菇',a:'200g'},{n:'大蒜',a:'4瓣'},{n:'百里香、月桂叶',a:'适量'}],
      '调味料':[{n:'红酒',a:'500ml'},{n:'牛骨汤',a:'300ml'},{n:'面粉',a:'1大勺'},{n:'盐、黑胡椒',a:'适量'}],
    },
    steps:['牛腩切块，用红酒和百里香腌制一夜。','培根煸出油脂捞出，牛肉分批煎至焦褐。','炒软洋葱蒜和胡萝卜，加面粉翻炒。','倒入红酒和牛骨汤，小火炖2小时。','最后半小时放蘑菇，收汁至浓稠。'],
    notes:'提前一天腌制效果最佳。铸铁锅炖味道更好。配土豆泥是经典。' },

  { type:'cocktail', name:'烟熏 Martini', sub:'Smoked Martini · stir',
    attrs:[{k:'杯型',v:'马提尼杯'},{k:'手法',v:'Stir'},{k:'酒精度',v:'极高'}],
    ing:{
      '基酒':[{n:'法穆金酒',a:'45ml'},{n:'诗洛珂伏特加',a:'30ml'},{n:'阿贝10年',a:'3ml'}],
      '加强酒 / 苦精':[{n:'诺利帕特干味美思',a:'5ml'},{n:'橙味苦精',a:'1 dash'}],
      '装饰':[{n:'橙皮',a:'喷香'}],
    },
    steps:['调酒杯加满冰，依次倒入所有酒液。','充分搅拌至冰冷，约40秒。','滤入冰镇马提尼杯。','橙皮朝杯口挤压喷香油，沿杯沿擦一圈后丢弃或挂边。'],
    notes:'阿贝10年用量极少，只取烟熏香气，不可多加。诺利帕特要冷藏保存。务必 stir 不要 shake，保持酒体清澈透亮。' },

  { type:'cocktail', name:'Sazerac', sub:'萨泽拉克 · stir',
    attrs:[{k:'杯型',v:'老式杯'},{k:'手法',v:'Stir'},{k:'酒精度',v:'高'}],
    ing:{
      '基酒':[{n:'干邑白兰地',a:'30ml'},{n:'黑麦威士忌',a:'30ml'}],
      '苦精':[{n:'佩乔苦精',a:'5 dash'},{n:'安哥苦精',a:'3 dash'}],

  { type:'dessert', name:'巧克力生乳卷', sub:'Chocolate Swiss Roll',
    attrs:[{k:'难度',v:'中等'},{k:'时间',v:'1.5小时'},{k:'份量',v:'25×25cm一盘'}],

      '冷藏2小时定型，切片，表面撒可可粉。',
    ],
    notes:'蛋白打至小弯钩不要过发，否则卷的时候容易裂。卷的时候要趁蛋糕胚还有余温，冷透后更容易开裂。奶油不要打太发，七分发更容易涂抹均匀。' },

  { type:'dessert', name:'歌剧院蛋糕', sub:'Opéra Cake',

    ing:{

      '咖啡甘纳许':[{n:'蛋黄',a:'60g'},{n:'白砂糖（蛋黄用）',a:'50g'},{n:'牛奶',a:'75g'},{n:'白砂糖（牛奶用）',a:'20g'},{n:'黄油',a:'130g'},{n:'浓缩咖啡',a:'1份'},{n:'香草精',a:'适量'}],
    },

    attrs:[{k:'难度',v:'中等'},{k:'时间',v:'40分钟'},{k:'份量',v:'3-4人'}],
    ing:{
      '肉 / 海鲜':[{n:'生鱼',a:'1条 约3斤'}],
      '辅料':[{n:'酸菜',a:'500g'},{n:'红泡椒',a:'100g'},{n:'生姜',a:'约50g'},{n:'大蒜',a:'约80g'},{n:'葱花、香菜',a:'适量'},{n:'鸡蛋清',a:'1个'},{n:'土豆淀粉',a:'1小把'}],
      '调味料':[{n:'菜籽油',a:'1小碗'},{n:'猪油',a:'适量'},{n:'豆瓣酱',a:'适量'},{n:'黄酒',a:'适量'},{n:'盐',a:'适量'},{n:'白糖',a:'半勺'},{n:'胡椒粉',a:'1勺'},{n:'生抽',a:'适量'},{n:'晒醋',a:'少许'}],
      '泼油':[{n:'菜籽油',a:'1碗'},{n:'大蒜',a:'适量'},{n:'青红花椒',a:'适量'},{n:'干辣椒',a:'适量'}],
    },
    steps:['鱼片成薄片，鱼骨斩块；鱼片加盐、蛋清、土豆淀粉抓匀腌制10分钟。','酸菜切段，姜蒜切片备用。','锅中菜籽油加猪油烧热，下姜蒜、红泡椒、豆瓣酱炒香出红油。','加入酸菜翻炒出香，加足量热水烧开，先下鱼骨煮3-4分钟。','鱼片逐片下锅，加黄酒、白糖、胡椒粉、生抽调味，鱼片变白即关火，加少许晒醋提鲜。','盛入大碗，铺葱花、香菜、蒜片、花椒和干辣椒。','菜籽油烧至高温冒烟，均匀泼在配料上，激出香气即成。'],
    notes:'鱼片要薄且均匀，蛋清和淀粉让鱼片嫩滑不散。酸菜要充分炒香才够味。晒醋少许提鲜，不能多。泼油温度要够高是香气关键。辣椒花椒用量按个人口味调整。' },
];

function pad(n) { return String(n).padStart(3,'0'); }

function makeCard(r, idx) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-idx">${typeMap[r.type]} — ${pad(idx+1)}</div>
    <div class="card-name">${r.name}</div>
    <div class="card-sub">${r.sub||''}</div>
    <div class="card-attrs">${r.attrs.map(a=>`<div class="card-attr">${a.k}<span>${a.v}</span></div>`).join('')}</div>
    <div class="card-arrow">→</div>`;
  div.onclick = () => openDetail(idx);
  addHover(div);
  return div;
}

function render() {
  ['all','food','cocktail','dessert'].forEach(t => document.getElementById('grid-'+t).innerHTML = '');
  data.forEach((r,i) => {
    document.getElementById('grid-all').appendChild(makeCard(r,i));
    document.getElementById('grid-'+r.type).appendChild(makeCard(r,i));
  });
  ['food','cocktail','dessert'].forEach(t => {
    const g = document.getElementById('grid-'+t);
    if (!g.children.length) g.innerHTML = '<div class="empty-msg">暂无配方</div>';
  });
  document.getElementById('navCount').textContent = `— ${data.length}`;
}

function showSec(id, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  const sec = document.getElementById('sec-'+id);
  sec.style.animation = 'none'; void sec.offsetWidth; sec.style.animation = '';
  sec.classList.add('visible');
}

function openDetail(idx) {
  const r = data[idx];
  document.getElementById('detailPanel').innerHTML = `
    <div class="d-tag">${typeMap[r.type]} — ${pad(idx+1)}</div>
    <div class="d-title">${r.name}</div>
    <div class="d-sub">${r.sub||''}</div>
    <div class="d-attrs">${r.attrs.map(a=>`<div class="d-attr">${a.k}<span>${a.v}</span></div>`).join('')}</div>
    <div class="d-section">
      <div class="d-sec-label">食材 / 原料</div>
      ${Array.isArray(r.ing)
        ? r.ing.map(i=>`<div class="d-ing"><span>${i.n}</span><span class="d-ing-amt">${i.a}</span></div>`).join("")
        : Object.entries(r.ing).map(([cat,items])=>
            `<div class="d-ing-cat">${cat}</div>`+items.map(i=>`<div class="d-ing"><span>${i.n}</span><span class="d-ing-amt">${i.a}</span></div>`).join("")
          ).join("")
      }
    </div>
    <div class="d-section">
      <div class="d-sec-label">步骤</div>
      ${r.steps.map((s,i)=>`<div class="d-step"><span class="d-step-n">${i+1}</span><span>${s}</span></div>`).join('')}
    </div>
    ${r.notes?`<div class="d-notes">${r.notes}</div>`:''}`;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function overlayClick(e) {
  if (e.target.classList.contains('overlay') || e.target.classList.contains('detail-close-zone')) {
    document.getElementById('detailOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function updateLabels() {
  const t = document.getElementById('fType').value;
  const ls = attrMap[t];
  document.getElementById('lA1').textContent = ls[0];
  document.getElementById('lA2').textContent = ls[1];
  document.getElementById('lA3').textContent = ls[2];
}

function openForm() {
  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  updateLabels();
}

function closeForm() {
  document.getElementById('formOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function formOverlayClick(e) {
  if (e.target === document.getElementById('formOverlay')) closeForm();
}

function saveRecipe() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('请填写配方名称'); return; }
  const type = document.getElementById('fType').value;
  const ls = attrMap[type];
  data.push({
    type, name,
    sub: document.getElementById('fSub').value.trim(),
    attrs: [
      {k:ls[0], v:document.getElementById('fA1').value.trim()||'—'},
      {k:ls[1], v:document.getElementById('fA2').value.trim()||'—'},
      {k:ls[2], v:document.getElementById('fA3').value.trim()||'—'},
    ],
    ing: document.getElementById('fIng').value.trim().split('\n').filter(l=>l.trim()).map(l=>{
      const p=l.split('，'); return {n:p[0]?.trim()||l, a:p[1]?.trim()||''};
    }),
    steps: document.getElementById('fSteps').value.trim().split('\n').filter(l=>l.trim()),
    notes: document.getElementById('fNotes').value.trim(),
  });
  render();
  ['fName','fSub','fA1','fA2','fA3','fIng','fSteps','fNotes'].forEach(id => document.getElementById(id).value='');
  closeForm();
}

render();
</script>
